{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MyShots{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #fff; }
        .page-wrap { max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
        .page-header img { width: 100%; height: auto; display: block; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="page-wrap">
        <header class="page-header">
            <img src="{% static 'img/myshots_page_header.svg' %}" alt="MyShots">
        </header>
        {% block content %}{% endblock %}
    </div>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
