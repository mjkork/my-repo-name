<svg viewBox="0 0 1200 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MyShots - Training Journal">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d4a2e"/>
      <stop offset="55%" stop-color="#3d3a26"/>
      <stop offset="100%" stop-color="#4a3826"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="180" fill="url(#bgGrad)"/>
  <rect width="1200" height="180" fill="url(#vignette)"/>

  <!-- Decorative double border -->
  <rect x="14" y="14" width="1172" height="152" fill="none" stroke="#b8965a" stroke-width="1.2" opacity="0.55"/>
  <rect x="20" y="20" width="1160" height="140" fill="none" stroke="#b8965a" stroke-width="0.5" opacity="0.4"/>

  <!-- Left ornament: Longbow with nocked arrow -->
  <g transform="translate(270, 90)" stroke-linecap="round">
    <!-- Bow limbs -->
    <path d="M 0 -63 Q 23 -31 23 0 Q 23 31 0 63" fill="none" stroke="#c9a961" stroke-width="2.5" opacity="0.9"/>
    <!-- Bow tips -->
    <circle cx="0" cy="-63" r="1.5" fill="#c9a961"/>
    <circle cx="0" cy="63" r="1.5" fill="#c9a961"/>
    <!-- Bowstring (drawn back) -->
    <path d="M 0 -63 L -5 0 L 0 63" fill="none" stroke="#f4ecd8" stroke-width="0.7" opacity="0.65"/>
    <!-- Arrow shaft -->
    <line x1="-54" y1="0" x2="47" y2="0" stroke="#f4ecd8" stroke-width="1.1" opacity="0.85"/>
    <!-- Arrowhead -->
    <polygon points="47,0 39,-3 39,3" fill="#c9a961"/>
    <!-- Fletching -->
    <path d="M -54 0 L -60 -4 L -49 -1 Z" fill="#c9a961" opacity="0.85"/>
    <path d="M -54 0 L -60 4 L -49 1 Z" fill="#b8965a" opacity="0.7"/>
  </g>

  <!-- Right ornament: Concentric target -->
  <g transform="translate(930, 90)" fill="none" stroke="#c9a961">
    <circle r="53" stroke-width="0.8" opacity="0.35"/>
    <circle r="43" stroke-width="0.8" opacity="0.45"/>
    <circle r="34" stroke-width="0.8" opacity="0.55"/>
    <circle r="24" stroke-width="0.8" opacity="0.7"/>
    <circle r="14" stroke-width="0.8" opacity="0.85"/>
    <circle r="5" fill="#c9a961" opacity="0.95" stroke="none"/>
    <!-- Crosshair tick marks -->
    <line x1="-58" y1="0" x2="-53" y2="0" stroke-width="0.6" opacity="0.5"/>
    <line x1="53" y1="0" x2="58" y2="0" stroke-width="0.6" opacity="0.5"/>
    <line x1="0" y1="-58" x2="0" y2="-53" stroke-width="0.6" opacity="0.5"/>
    <line x1="0" y1="53" x2="0" y2="58" stroke-width="0.6" opacity="0.5"/>
  </g>

  <!-- Top flourish -->
  <g transform="translate(600, 48)" opacity="0.7" fill="none" stroke="#b8965a" stroke-width="0.6">
    <line x1="-60" y1="0" x2="-10" y2="0"/>
    <line x1="10" y1="0" x2="60" y2="0"/>
    <circle cx="0" cy="0" r="2" fill="#c9a961" stroke="none"/>
    <path d="M -10 0 L -5 -2.5 L -5 2.5 Z" fill="#b8965a" stroke="none"/>
    <path d="M 10 0 L 5 -2.5 L 5 2.5 Z" fill="#b8965a" stroke="none"/>
  </g>

  <!-- Title -->
  <text x="600" y="102" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="42" font-weight="400"
        fill="#f4ecd8" letter-spacing="10">MYSHOTS</text>

  <!-- Subtitle -->
  <text x="600" y="128" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="14" font-style="italic"
        fill="#c9a961" letter-spacing="3">Training Journal</text>

  <!-- Bottom flourish -->
  <g transform="translate(600, 146)" opacity="0.7" fill="none" stroke="#b8965a" stroke-width="0.6">
    <line x1="-60" y1="0" x2="-10" y2="0"/>
    <line x1="10" y1="0" x2="60" y2="0"/>
    <circle cx="0" cy="0" r="2" fill="#c9a961" stroke="none"/>
  </g>
</svg>
